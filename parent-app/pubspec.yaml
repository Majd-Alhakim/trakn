name: trakn_parent
description: TRAKN — Indoor Child Localization Parent App
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Map rendering
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # WebSocket
  web_socket_channel: ^3.0.1

  # HTTP client
  dio: ^5.4.3+1

  # Secure storage for JWT
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
